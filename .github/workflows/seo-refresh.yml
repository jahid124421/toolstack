name: SEO Refresh + Deploy

on:
  schedule:
    # Run every Monday at 6:00 UTC
    - cron: '0 6 * * 1'
  push:
    branches: [main]
  workflow_dispatch:
    # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate SEO pages
        run: |
          echo "Regenerating SEO pages from tools-data.js..."
          python build_seo_pages.py
          echo "SEO pages regenerated successfully."

      - name: Create IndexNow key file
        run: |
          echo "${{ secrets.INDEXNOW_KEY }}" > ${{ secrets.INDEXNOW_KEY }}.txt
          echo "IndexNow key file created."

      - name: Commit SEO updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-regenerate SEO pages [skip ci]"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=toolstack --branch=main

      - name: Submit URLs to IndexNow
        run: |
          python indexnow_submit.py
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

  setup-domain:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup custom domain
        run: |
          python setup_domain.py
        env:
          DIGITALPLAT_API_KEY: ${{ secrets.DIGITALPLAT_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
